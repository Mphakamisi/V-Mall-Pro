<!DOCTYPE html>
<html>
  <head>
    <title>V-MALL | Mobile Joystick Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
        body { margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; background: #000; user-select: none; }
        
        /* MOBILE MOVEMENT CONTROLS */
        #controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }
        .move-btn {
            width: 70px; height: 70px; background: rgba(10, 25, 47, 0.9);
            border: 2px solid #64ffda; border-radius: 15px; color: #64ffda;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; touch-action: none;
        }
        .move-btn:active { background: #64ffda; color: #112240; }

        #top-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 25, 47, 0.9); color: #64ffda; padding: 10px 25px;
            border-radius: 5px; border: 1px solid #64ffda; z-index: 100; pointer-events: none;
            text-transform: uppercase; letter-spacing: 3px; font-size: 14px;
        }

        #exit-btn {
            position: absolute; top: 20px; left: 20px; padding: 12px 24px;
            background: #ff4d4d; color: white; border: none; border-radius: 5px;
            display: none; z-index: 200; font-weight: bold; cursor: pointer;
        }
    </style>
  </head>
  <body>

    <div id="top-label">GRAND ATRIUM</div>
    <button id="exit-btn" onclick="exitToMall()">← EXIT</button>
    
    <div id="controls">
        <div class="move-btn" id="up-btn">▲</div>
        <div class="move-btn" id="down-btn">▼</div>
    </div>

    <script>
      let currentBrand = "";
      let movingForward = false;
      let movingBackward = false;
      const moveSpeed = 0.15;

      // Logic for holding buttons
      const upBtn = document.getElementById('up-btn');
      const downBtn = document.getElementById('down-btn');

      upBtn.addEventListener('touchstart', () => movingForward = true);
      upBtn.addEventListener('touchend', () => movingForward = false);
      downBtn.addEventListener('touchstart', () => movingBackward = true);
      downBtn.addEventListener('touchend', () => movingBackward = false);
      
      // Mouse fallbacks for testing on PC
      upBtn.addEventListener('mousedown', () => movingForward = true);
      upBtn.addEventListener('mouseup', () => movingForward = false);
      downBtn.addEventListener('mousedown', () => movingBackward = true);
      downBtn.addEventListener('mouseup', () => movingBackward = false);

      // Custom movement loop
      AFRAME.registerComponent('mobile-move', {
        tick: function () {
          const cam = this.el;
          const rotation = cam.getAttribute('rotation');
          const position = cam.getAttribute('position');
          
          const angle = rotation.y * (Math.PI / 180);

          if (movingForward) {
            position.x -= Math.sin(angle) * moveSpeed;
            position.z -= Math.cos(angle) * moveSpeed;
          }
          if (movingBackward) {
            position.x += Math.sin(angle) * moveSpeed;
            position.z += Math.cos(angle) * moveSpeed;
          }
          cam.setAttribute('position', position);
        }
      });

      const brandLinks = {
        "H&M": "https://www2.hm.com", "Zara": "https://www.zara.com",
        "Gap": "https://www.gap.com", "Hollister": "https://www.hollisterco.com",
        "Blivion": "https://github.com" 
      };

      AFRAME.registerComponent('gate-logic', {
        schema: { brand: {type: 'string'} },
        init: function () {
          this.el.addEventListener('click', () => {
            currentBrand = this.data.brand;
            document.querySelector('#mall-world').setAttribute('visible', 'false');
            document.querySelector('#store-interior').setAttribute('visible', 'true');
            document.querySelector('#top-label').innerText = currentBrand;
            document.querySelector('#exit-btn').style.display = "block";
            document.querySelector('#camera').setAttribute('position', '0 1.6 4');
          });
        }
      });

      function redirectToStore() { window.open(brandLinks[currentBrand], '_blank'); }

      function exitToMall() {
        document.querySelector('#mall-world').setAttribute('visible', 'true');
        document.querySelector('#store-interior').setAttribute('visible', 'false');
        document.querySelector('#top-label').innerText = "GRAND ATRIUM";
        document.querySelector('#exit-btn').style.display = "none";
        document.querySelector('#camera').setAttribute('position', '0 1.6 8');
      }
    </script>

    <a-scene cursor="rayOrigin: mouse" renderer="antialias: true">
      
      <a-entity id="camera" camera look-controls="touchEnabled: true" mobile-move position="0 1.6 8">
        <a-cursor color="#64ffda" raycaster="objects: .clickable, a-box, a-ring"></a-cursor>
      </a-entity>

      <a-entity id="mall-world">
          <a-sky color="#050a14"></a-sky>
          <a-plane rotation="-90 0 0" width="100" height="100" color="#0a1224"></a-plane>
          <a-grid width="100" height="100" color="#64ffda" opacity="0.1" position="0 0.01 0"></a-grid>
          
          <script>
            const brands = [
                {name: "H&M", color: "#E50012"}, {name: "Zara", color: "#000"},
                {name: "Gap", color: "#003087"}, {name: "Hollister", color: "#222"}
            ];
            const mall = document.querySelector('#mall-world');
            brands.forEach((brand, i) => {
                const angle = (i / brands.length) * Math.PI * 2;
                const x = Math.cos(angle) * 18; const z = Math.sin(angle) * 18;
                const rot = -((angle * 180) / Math.PI) - 90;
                const stall = document.createElement('a-entity');
                stall.setAttribute('position', `${x} 0 ${z}`);
                stall.setAttribute('rotation', `0 ${rot} 0`);
                stall.innerHTML = `
                    <a-box position="0 3 0" width="8" height="6" depth="1" color="#112240" gate-logic="brand: ${brand.name}">
                        <a-plane position="0 2 0.51" width="6" height="1.2" color="${brand.color}">
                            <a-text value="${brand.name}" align="center" width="10"></a-text>
                        </a-plane>
                    </a-box>
                    <a-ring color="#64ffda" radius-inner="1" radius-outer="1.3" position="0 0.1 4" rotation="-90 0 0" gate-logic="brand: ${brand.name}"></a-ring>
                `;
                mall.appendChild(stall);
            });
          </script>
      </a-entity>

      <a-entity id="store-interior" visible="false">
          <a-sky color="#0a0a0a"></a-sky>
          <a-plane rotation="-90 0 0" width="20" height="20" color="#1a1a1a"></a-plane>
          <a-cylinder position="0 0.1 -5" radius="2" height="0.2" color="#ff4d4d"></a-cylinder>
          <a-box position="0 2 -5" width="1.5" height="1.5" depth="1.5" color="#112240" 
                 class="clickable" onclick="redirectToStore()" 
                 animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
              <a-text value="SHOP SITE" align="center" position="0 0 0.76" width="4" color="#64ffda"></a-text>
          </a-box>
      </a-entity>

    </a-scene>
  </body>
</html>
