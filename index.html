<!DOCTYPE html>
<html>
  <head>
    <title>V-MALL | Full Mobile Controls</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
        body { margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; background: #000; user-select: none; }
        
        /* D-PAD CONTROLS */
        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px;
            gap: 10px; z-index: 1000;
        }
        .move-btn {
            width: 70px; height: 70px; background: rgba(10, 25, 47, 0.9);
            border: 2px solid #64ffda; border-radius: 15px; color: #64ffda;
            display: flex; align-items: center; justify-content: center;
            font-size: 25px; cursor: pointer; touch-action: none;
        }
        .move-btn:active { background: #64ffda; color: #112240; }
        #up-btn { grid-column: 2; }
        #left-btn { grid-column: 1; grid-row: 2; }
        #down-btn { grid-column: 2; grid-row: 2; }
        #right-btn { grid-column: 3; grid-row: 2; }

        #top-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 25, 47, 0.9); color: #64ffda; padding: 8px 20px;
            border-radius: 5px; border: 1px solid #64ffda; z-index: 100; pointer-events: none;
            text-transform: uppercase; letter-spacing: 2px; font-size: 12px;
        }
        #exit-btn {
            position: absolute; top: 20px; left: 20px; padding: 10px 20px;
            background: #ff4d4d; color: white; border: none; border-radius: 5px;
            display: none; z-index: 200; font-weight: bold;
        }
    </style>
  </head>
  <body>

    <div id="top-label">GRAND ATRIUM</div>
    <button id="exit-btn" onclick="exitToMall()">← EXIT</button>
    
    <div id="controls">
        <div class="move-btn" id="up-btn">▲</div>
        <div class="move-btn" id="left-btn">◀</div>
        <div class="move-btn" id="down-btn">▼</div>
        <div class="move-btn" id="right-btn">▶</div>
    </div>

    <script>
      let currentBrand = "";
      let move = { f: false, b: false, l: false, r: false };
      const speed = 0.12;

      const setupBtn = (id, key) => {
          const el = document.getElementById(id);
          const start = () => move[key] = true;
          const stop = () => move[key] = false;
          el.addEventListener('touchstart', start); el.addEventListener('touchend', stop);
          el.addEventListener('mousedown', start); el.addEventListener('mouseup', stop);
      };

      setupBtn('up-btn', 'f'); setupBtn('down-btn', 'b');
      setupBtn('left-btn', 'l'); setupBtn('right-btn', 'r');

      AFRAME.registerComponent('mobile-move', {
        tick: function () {
          const cam = this.el;
          const rot = cam.getAttribute('rotation');
          const pos = cam.getAttribute('position');
          const rad = rot.y * (Math.PI / 180);

          if (move.f) { pos.x -= Math.sin(rad) * speed; pos.z -= Math.cos(rad) * speed; }
          if (move.b) { pos.x += Math.sin(rad) * speed; pos.z += Math.cos(rad) * speed; }
          if (move.l) { pos.x -= Math.cos(rad) * speed; pos.z += Math.sin(rad) * speed; }
          if (move.r) { pos.x += Math.cos(rad) * speed; pos.z -= Math.sin(rad) * speed; }
          cam.setAttribute('position', pos);
        }
      });

      const brandLinks = { "H&M": "https://www2.hm.com", "Zara": "https://www.zara.com", "Gap": "https://www.gap.com", "Hollister": "https://www.hollisterco.com", "Blivion": "https://github.com" };

      AFRAME.registerComponent('gate-logic', {
        schema: { brand: {type: 'string'} },
        init: function () {
          this.el.addEventListener('click', () => {
            currentBrand = this.data.brand;
            document.querySelector('#mall-world').setAttribute('visible', 'false');
            document.querySelector('#store-interior').setAttribute('visible', 'true');
            document.querySelector('#top-label').innerText = currentBrand;
            document.querySelector('#exit-btn').style.display = "block";
            document.querySelector('#camera').setAttribute('position', '0 1.6 4');
          });
        }
      });

      function exitToMall() {
        document.querySelector('#mall-world').setAttribute('visible', 'true');
        document.querySelector('#store-interior').setAttribute('visible', 'false');
        document.querySelector('#top-label').innerText = "GRAND ATRIUM";
        document.querySelector('#exit-btn').style.display = "none";
        document.querySelector('#camera').setAttribute('position', '0 1.6 8');
      }
    </script>

    <a-scene cursor="rayOrigin: mouse">
      <a-entity id="camera" camera look-controls="touchEnabled: true" mobile-move position="0 1.6 8">
        <a-cursor color="#64ffda"></a-cursor>
      </a-entity>

      <a-entity id="mall-world">
          <a-sky color="#050a14"></a-sky>
          <a-plane rotation="-90 0 0" width="100" height="100" color="#0a1224"></a-plane>
          <a-grid width="100" height="100" color="#64ffda" opacity="0.1" position="0 0.01 0"></a-grid>
          <script>
            const brands = [{name: "H&M", color: "#E50012"}, {name: "Zara", color: "#000"}, {name: "Gap", color: "#003087"}, {name: "Hollister", color: "#222"}];
            const mall = document.querySelector('#mall-world');
            brands.forEach((brand, i) => {
                const angle = (i / brands.length) * Math.PI * 2;
                const x = Math.cos(angle) * 18; const z = Math.sin(angle) * 18;
                const rot = -((angle * 180) / Math.PI) - 90;
                const stall = document.createElement('a-entity');
                stall.setAttribute('position', `${x} 0 ${z}`);
                stall.setAttribute('rotation', `0 ${rot} 0`);
                stall.innerHTML = `<a-box position="0 3 0" width="8" height="6" depth="1" color="#112240" gate-logic="brand: ${brand.name}"><a-plane position="0 2 0.51" width="6" height="1.2" color="${brand.color}"><a-text value="${brand.name}" align="center" width="10"></a-text></a-plane></a-box><a-ring color="#64ffda" radius-inner="1" radius-outer="1.3" position="0 0.1 4" rotation="-90 0 0" gate-logic="brand: ${brand.name}"></a-ring>`;
                mall.appendChild(stall);
            });
          </script>
      </a-entity>

      <a-entity id="store-interior" visible="false">
          <a-sky color="#0a0a0a"></a-sky>
          <a-plane rotation="-90 0 0" width="20" height="20" color="#1a1a1a"></a-plane>
          <a-cylinder position="0 0.1 -5" radius="2" height="0.2" color="#ff4d4d"></a-cylinder>
          <a-box position="0 2 -5" width="1.5" height="1.5" depth="1.5" color="#112240" class="clickable" onclick="window.open(brandLinks[currentBrand], '_blank')" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
              <a-text value="SHOP" align="center" position="0 0 0.76" width="4" color="#64ffda"></a-text>
          </a-box>
      </a-entity>
    </a-scene>
  </body>
</html>
