<!DOCTYPE html>
<html>
  <head>
    <title>V-MALL | Fixed Movement Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
        body { margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; background: #000; user-select: none; touch-action: none; }
        
        /* JOYSTICK */
        #joystick-wrapper {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 140px; height: 140px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid #64ffda; border-radius: 50%; z-index: 1000;
        }
        #joystick-knob {
            position: absolute; top: 40px; left: 40px; width: 60px; height: 60px;
            background: #64ffda; border-radius: 50%; box-shadow: 0 0 25px #64ffda;
        }

        #top-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 25, 47, 0.95); color: #64ffda; padding: 12px 35px;
            border-radius: 5px; border: 1px solid #64ffda; z-index: 100; pointer-events: none;
            text-transform: uppercase; letter-spacing: 5px; font-size: 18px;
        }
        #exit-btn {
            position: absolute; top: 20px; left: 20px; padding: 12px 24px;
            background: #ff4d4d; color: white; border: none; border-radius: 5px;
            display: none; z-index: 200; font-weight: bold; cursor: pointer;
        }
    </style>
  </head>
  <body>

    <div id="top-label">V-MALL</div>
    <button id="exit-btn" onclick="exitToMall()">← EXIT</button>
    
    <div id="joystick-wrapper">
        <div id="joystick-knob"></div>
    </div>

    <script>
      let moveX = 0; let moveZ = 0;
      const speed = 0.22; // Slightly faster for better feel

      // JOYSTICK PHYSICS
      const knob = document.getElementById('joystick-knob');
      const base = document.getElementById('joystick-wrapper');
      let dragging = false;

      const updateMove = (e) => {
          if (!dragging) return;
          const t = e.touches ? e.touches[0] : e;
          const r = base.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          
          let dx = t.clientX - cx;
          let dy = t.clientY - cy;
          const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
          const angle = Math.atan2(dy, dx);

          knob.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;

          // RAW VALUES
          moveX = (Math.cos(angle) * (dist / 60));
          moveZ = (Math.sin(angle) * (dist / 60));
      };

      const stopMove = () => {
          dragging = false; moveX = 0; moveZ = 0;
          knob.style.transform = `translate(0,0)`;
      };

      base.addEventListener('touchstart', (e) => { dragging = true; updateMove(e); });
      window.addEventListener('touchmove', updateMove);
      window.addEventListener('touchend', stopMove);
      base.addEventListener('mousedown', () => dragging = true);
      window.addEventListener('mousemove', updateMove);
      window.addEventListener('mouseup', stopMove);

      AFRAME.registerComponent('smart-move', {
        tick: function () {
          if (moveX === 0 && moveZ === 0) return;
          const cam = this.el;
          const rot = cam.getAttribute('rotation');
          const pos = cam.getAttribute('position');
          const rad = rot.y * (Math.PI / 180);

          // THE ULTIMATE INVERSION FIX:
          // Pushing UP now adds to Forward motion correctly
          pos.x += Math.sin(rad) * (moveZ * speed);
          pos.z += Math.cos(rad) * (moveZ * speed);
          
          // Strafe Correction (Sideways)
          pos.x -= Math.cos(rad) * (moveX * speed);
          pos.z -= Math.sin(rad) * (moveX * speed);
          
          cam.setAttribute('position', pos);
        }
      });

      const brandLinks = {
        "Woolworths": "https://www.woolworths.co.za", "Mr Price": "https://www.mrp.com",
        "Cotton On": "https://bash.com/brands/cotton-on", "Zara SA": "https://www.zara.com/za/",
        "H&M SA": "https://superbalist.com/brand/hm", "Truworths": "https://www.truworths.co.za",
        "Foschini": "https://bash.com/foschini/clothing", "Blivion": "https://github.com"
      };

      AFRAME.registerComponent('gate-logic', {
        schema: { brand: {type: 'string'} },
        init: function () {
          this.el.addEventListener('click', () => {
            document.querySelector('#mall-world').setAttribute('visible', 'false');
            document.querySelector('#store-interior').setAttribute('visible', 'true');
            document.querySelector('#top-label').innerText = this.data.brand;
            document.querySelector('#exit-btn').style.display = "block";
            document.querySelector('#camera').setAttribute('position', '0 1.6 4');
            window.currentBrand = this.data.brand;
          });
        }
      });

      function exitToMall() {
        document.querySelector('#mall-world').setAttribute('visible', 'true');
        document.querySelector('#store-interior').setAttribute('visible', 'false');
        document.querySelector('#top-label').innerText = "V-MALL";
        document.querySelector('#exit-btn').style.display = "none";
        document.querySelector('#camera').setAttribute('position', '0 1.6 8');
      }
    </script>

    <a-scene cursor="rayOrigin: mouse">
      <a-entity id="camera" camera 
                look-controls="touchEnabled: true; magicWindowTrackingEnabled: false" 
                smart-move position="0 1.6 8">
        <a-cursor color="#64ffda"></a-cursor>
      </a-entity>

      <a-entity id="mall-world">
          <a-sky color="#050a14"></a-sky>
          <a-plane rotation="-90 0 0" width="100" height="100" color="#0a1224"></a-plane>
          <a-grid width="100" height="100" color="#64ffda" opacity="0.1" position="0 0.01 0"></a-grid>
          <script>
            const brands = [
                {name: "Woolworths", color: "#000"}, {name: "Mr Price", color: "#E50012"},
                {name: "Cotton On", color: "#444"}, {name: "Zara SA", color: "#000"},
                {name: "H&M SA", color: "#E50012"}, {name: "Truworths", color: "#222"},
                {name: "Foschini", color: "#333"}
            ];
            const mall = document.querySelector('#mall-world');
            brands.forEach((brand, i) => {
                const angle = (i / brands.length) * Math.PI * 2;
                const x = Math.cos(angle) * 20; const z = Math.sin(angle) * 25;
                const rot = -((angle * 180) / Math.PI) - 90;
                const stall = document.createElement('a-entity');
                stall.setAttribute('position', `${x} 0 ${z}`);
                stall.setAttribute('rotation', `0 ${rot} 0`);
                stall.innerHTML = `<a-box position="0 3 0" width="8" height="6" depth="1" color="#112240" gate-logic="brand: ${brand.name}"><a-plane position="0 2 0.51" width="6" height="1.2" color="${brand.color}"><a-text value="${brand.name}" align="center" width="10"></a-text></a-plane></a-box><a-ring color="#64ffda" radius-inner="1" radius-outer="1.3" position="0 0.1 4" rotation="-90 0 0" gate-logic="brand: ${brand.name}"></a-ring>`;
                mall.appendChild(stall);
            });
          </script>
      </a-entity>

      <a-entity id="store-interior" visible="false">
          <a-sky color="#0a0a0a"></a-sky>
          <a-plane rotation="-90 0 0" width="20" height="20" color="#1a1a1a"></a-plane>
          <a-cylinder position="0 0.1 -5" radius="2" height="0.2" color="#ff4d4d"></a-cylinder>
          <a-box position="0 2 -5" width="1.5" height="1.5" depth="1.5" color="#112240" class="clickable" onclick="window.open(brandLinks[window.currentBrand], '_blank')" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
              <a-text value="SHOP SITE" align="center" position="0 0 0.76" width="4" color="#64ffda"></a-text>
          </a-box>
      </a-entity>
    </a-scene>
  </body>
</html>
