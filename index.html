<!DOCTYPE html>
<html>
  <head>
    <title>V-MALL | Full Portal & Interaction</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
        body { margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; background: #000; }
        
        /* THE BROWSER OVERLAY */
        #web-browser {
            display: none; position: absolute; top: 10%; left: 10%;
            width: 80%; height: 80%; background: white; border: 5px solid #64ffda;
            z-index: 1000; border-radius: 10px; overflow: hidden;
        }
        #web-browser iframe { width: 100%; height: 100%; border: none; }
        #close-browser {
            position: absolute; top: 10px; right: 10px; width: 40px; height: 40px;
            background: #ff4d4d; color: white; border-radius: 50%; border: none;
            font-weight: bold; cursor: pointer; z-index: 1001;
        }

        #top-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 25, 47, 0.9); color: #64ffda; padding: 10px 25px;
            border-radius: 5px; border: 1px solid #64ffda; z-index: 100; pointer-events: none;
            text-transform: uppercase; letter-spacing: 3px; font-size: 14px;
        }
        #exit-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; padding: 15px 30px; background: #333; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold; z-index: 200;
        }
    </style>
  </head>
  <body>

    <div id="top-label">GRAND ATRIUM</div>
    <button id="exit-btn" onclick="exitToMall()">← EXIT TO MALL</button>

    <div id="web-browser">
        <button id="close-browser" onclick="closeBrowser()">X</button>
        <iframe id="store-frame" src=""></iframe>
    </div>

    <script>
      let currentBrand = "";
      const brandLinks = {
        "H&M": "https://www2.hm.com", "Zara": "https://www.zara.com",
        "Gap": "https://www.gap.com", "Hollister": "https://www.hollisterco.com",
        "Blivion": "https://github.com" 
      };

      // Universal teleport logic
      AFRAME.registerComponent('gate-logic', {
        schema: { brand: {type: 'string'} },
        init: function () {
          this.el.addEventListener('click', () => {
            currentBrand = this.data.brand;
            document.querySelector('#mall-world').setAttribute('visible', 'false');
            document.querySelector('#store-interior').setAttribute('visible', 'true');
            document.querySelector('#top-label').innerText = currentBrand;
            document.querySelector('#exit-btn').style.display = "block";
            document.querySelector('#camera').setAttribute('position', '0 1.6 4');
          });
        }
      });

      function openBrowser(suffix = "") {
        const frame = document.getElementById('store-frame');
        // You could add suffixes to URLs here for specific categories
        frame.src = brandLinks[currentBrand]; 
        document.getElementById('web-browser').style.display = "block";
      }

      function closeBrowser() {
        document.getElementById('web-browser').style.display = "none";
        document.getElementById('store-frame').src = "";
      }

      function exitToMall() {
        closeBrowser();
        document.querySelector('#mall-world').setAttribute('visible', 'true');
        document.querySelector('#store-interior').setAttribute('visible', 'false');
        document.querySelector('#top-label').innerText = "GRAND ATRIUM";
        document.querySelector('#exit-btn').style.display = "none";
        document.querySelector('#camera').setAttribute('position', '0 1.6 8');
      }
    </script>

    <a-scene cursor="rayOrigin: mouse">
      <a-entity id="camera" camera look-controls wasd-controls position="0 1.6 8">
        <a-cursor color="#64ffda"></a-cursor>
      </a-entity>

      <a-entity id="mall-world">
          <a-sky color="#050a14"></a-sky>
          <a-plane rotation="-90 0 0" width="100" height="100" color="#0a1224"></a-plane>
          <a-grid width="100" height="100" color="#64ffda" opacity="0.1" position="0 0.01 0"></a-grid>
          
          <script>
            const brands = [
                {name: "H&M", color: "#E50012"}, {name: "Zara", color: "#000"},
                {name: "Gap", color: "#003087"}, {name: "Hollister", color: "#222"}
            ];
            const mall = document.querySelector('#mall-world');
            brands.forEach((brand, i) => {
                const angle = (i / brands.length) * Math.PI * 2;
                const x = Math.cos(angle) * 18;
                const z = Math.sin(angle) * 18;
                const rot = -((angle * 180) / Math.PI) - 90;

                const stall = document.createElement('a-entity');
                stall.setAttribute('position', `${x} 0 ${z}`);
                stall.setAttribute('rotation', `0 ${rot} 0`);
                stall.innerHTML = `
                    <a-box position="0 3 0" width="8" height="6" depth="1" color="#112240" gate-logic="brand: ${brand.name}">
                        <a-plane position="0 2 0.51" width="6" height="1.2" color="${brand.color}">
                            <a-text value="${brand.name}" align="center" width="10"></a-text>
                        </a-plane>
                        <a-text value="CLICK TO ENTER" align="center" position="0 -1 0.51" width="5" color="#64ffda"></a-text>
                    </a-box>
                    
                    <a-ring color="#64ffda" radius-inner="1" radius-outer="1.3" position="0 0.1 4" rotation="-90 0 0" 
                            gate-logic="brand: ${brand.name}" material="emissive: #64ffda; emissiveIntensity: 2"></a-ring>
                `;
                mall.appendChild(stall);
            });
          </script>
      </a-entity>

      <a-entity id="store-interior" visible="false">
          <a-sky color="#0a0a0a"></a-sky>
          
          <a-plane rotation="-90 0 0" width="20" height="20" color="#1a1a1a"></a-plane> <a-plane position="0 5 -10" width="20" height="10" color="#222"></a-plane> <a-plane position="-10 5 0" rotation="0 90 0" width="20" height="10" color="#222"></a-plane> <a-plane position="10 5 0" rotation="0 -90 0" width="20" height="10" color="#222"></a-plane> <a-cylinder position="0 0.1 -5" radius="2" height="0.2" color="#ff4d4d"></a-cylinder>
          <a-box position="0 2 -5" width="1.5" height="1.5" depth="1.5" color="#112240" 
                 class="clickable" onclick="openBrowser()"
                 animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
              <a-text value="MAIN SHOP" align="center" position="0 0 0.76" width="4" color="#64ffda"></a-text>
          </a-box>

          <a-box position="-9.5 2 -2" width="0.5" height="1.5" depth="1.5" color="#64ffda" 
                 class="clickable" onclick="openBrowser()" animation="property: position; dir: alternate; dur: 2000; loop: true; to: -9.5 2.2 -2">
              <a-text value="SHOES" rotation="0 90 0" align="center" position="0.3 0 0" width="4" color="#000"></a-text>
          </a-box>

          <a-box position="9.5 2 -2" width="0.5" height="1.5" depth="1.5" color="#fff" 
                 class="clickable" onclick="openBrowser()" animation="property: position; dir: alternate; dur: 2500; loop: true; to: 9.5 2.2 -2">
              <a-text value="NEW" rotation="0 -90 0" align="center" position="-0.3 0 0" width="4" color="#000"></a-text>
          </a-box>

          <a-text value="EXPLORE COLLECTION" align="center" position="0 6 -9.9" width="10" color="#fff"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
